<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Bucket Lines · Will Miner</title>
    <meta name="description" content="Draw ramps as balls fall continuously — guide them into the bucket." />
    <link rel="stylesheet" href="./bucket-game.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
  </head>
  <body class="bucket-game">
    <a class="bucket-game__skip" href="#hud-main">Skip to controls</a>
    <div id="game-root" class="bucket-game__root">
      <div id="bucket-game-reduced" class="bucket-game__reduced" hidden>
        <p>
          This mini-game uses motion and physics. With <strong>reduced motion</strong> enabled in your system
          settings, it stays turned off here.
        </p>
        <p><a href="./index.html">Back to the site</a></p>
      </div>

      <div id="bucket-game-active" class="bucket-game__active" hidden>
        <div class="bucket-game__stage">
          <canvas
            id="game-canvas"
            class="bucket-game__canvas"
            aria-label="Playfield: balls fall continuously; draw lines to guide them into the bucket."
            role="application"
          ></canvas>
        </div>

        <header id="hud-main" class="bucket-game__hud">
          <div class="bucket-game__hud-row bucket-game__hud-row--title">
            <span class="bucket-game__title">Bucket Lines</span>
            <span id="hud-level" class="bucket-game__meta" aria-live="polite"></span>
            <span id="hud-ramps" class="bucket-game__meta" aria-live="polite"></span>
          </div>
          <p id="hud-status" class="bucket-game__status" aria-live="polite"></p>
          <div class="bucket-game__hud-row bucket-game__hud-row--actions">
            <button type="button" id="btn-clear" class="bucket-game__btn">Clear lines</button>
            <button type="button" id="btn-reset" class="bucket-game__btn">Reset level</button>
            <a class="bucket-game__btn bucket-game__btn--link" href="./index.html">Home</a>
          </div>
        </header>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
    <script src="./scripts/bucket-lines-game.js" defer></script>
  </body>
</html>
